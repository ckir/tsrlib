name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v-manual'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            docker: ghcr.io/napi-rs/napi-rs/nodejs-rust:lts-debian
            build: pnpm run build:ffi
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            build: pnpm run build:ffi

    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      # - name: Install pnpm
      #   if: ${{ success() }}
      #   uses: pnpm/action-setup@v4
      #   with:
      #     version: 10.30.3
      #     run_install: true
      #     cache: true

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug node and pnpm versions
        run: |
          node --version
          npm --version
          pnpm --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Build
        run: ${{ matrix.settings.build }}
        env:
          TARGET: ${{ matrix.settings.target }}

      - name: Rename artifact on Linux / macOS
        if: ${{ matrix.settings.host == 'ubuntu-latest' || matrix.settings.host == 'macos-latest' }}
        shell: bash
        run: |
          # Map Rust targets to your sync-binaries naming convention
          if [[ "${{ matrix.settings.target }}" == *"windows"* ]]; then
            mv packages/tsdk/src/rsdk.node rsdk-windows-x86_64.node
          else
            mv packages/tsdk/src/rsdk.node rsdk-linux-x86_64.node
          fi

      - name: Rename artifact on Windows
        if: ${{ matrix.settings.host == 'windows-latest' }}
        shell: pwsh
        run: |
          $src = 'packages/tsdk/src/rsdk.node'
          if ($env:TARGET -like '*windows*') {
            $dest = 'rsdk-windows-x86_64.node'
          } else {
            $dest = 'rsdk-linux-x86_64.node'
          }
          if (Test-Path $src) {
            Move-Item -Path $src -Destination $dest -Force
          } else {
            Write-Host "Warning: $src not found"
            exit 1
          }

      - name: List workspace for debugging
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-${{ matrix.settings.target }}
          path: rsdk-*.node

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/rsdk-*.node
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
