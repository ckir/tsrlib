name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Manual Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v-manual'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # --- Linux ---
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rsdk-linux-x86_64.node
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rsdk-linux-arm64.node
            setup: |
              sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

          # --- macOS ---
          - host: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rsdk-darwin-x86_64.node
          - host: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rsdk-darwin-arm64.node

          # --- Windows ---
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rsdk-windows-x86_64.node
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: rsdk-windows-arm64.node

    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false # Explicitly manual to inject env vars

      - name: Install Dependencies
        run: pnpm install
        env:
          # Bypasses the sync-binaries.ts download check during CI
          TSR_DEV: "true"

      - name: Setup Linux Cross-Compilation
        if: ${{ matrix.settings.setup }}
        run: ${{ matrix.settings.setup }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Build FFI
        run: pnpm run build:ffi
        env:
          TARGET: ${{ matrix.settings.target }}

      - name: Package Binary
        shell: bash
        run: |
          # Find the generated .node file (napi-rs names it based on Cargo.toml)
          # We search in the root and subdirectories
          GENERATED_FILE=$(find . -name "*.node" | head -n 1)
          
          if [ -z "$GENERATED_FILE" ]; then
            echo "::error::No .node binary found after build!"
            exit 1
          fi
          
          echo "Found binary at: $GENERATED_FILE"
          mv "$GENERATED_FILE" "${{ matrix.settings.artifact_name }}"
          echo "Renamed to: ${{ matrix.settings.artifact_name }}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-${{ matrix.settings.target }}
          path: ${{ matrix.settings.artifact_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    # Add permissions to ensure the token can delete releases and tags
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release and Upload Binaries
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/rsdk-*.node
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Delete Older Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all release tags, sorted by newest first using the native GitHub CLI
          TAGS=$(gh release list --json tagName -q '.[].tagName')
          
          # Skip the first one (the one we just created) and loop through the rest
          echo "$TAGS" | tail -n +2 | while read TAG; do
            if [ -n "$TAG" ]; then
              echo "Deleting old release and tag: $TAG"
              # --cleanup-tag ensures the git tag is deleted along with the release
              gh release delete "$TAG" --cleanup-tag --yes
            fi
          done