# ============================================================================
# Release Binaries Workflow
# ============================================================================
# This workflow builds native binaries (Node.js .node files) for multiple
# platforms (Linux, macOS, Windows) and creates a GitHub release with the
# compiled artifacts.
#
# Triggers:
#   1. Tag Push: Automatically triggered when a tag matching 'v*' is pushed
#   2. Manual Dispatch: Can be manually triggered via GitHub UI with custom tag
#
# Platforms Built:
#   - Linux: x86_64 (gnu), arm64 (gnu)
#   - macOS: x86_64, arm64 (Apple Silicon)
#   - Windows: x86_64 (msvc), arm64 (msvc)
# ============================================================================

name: Release Binaries

on:
  push:
    tags:
      # Automatically trigger on semantic version tags (v1.0.0, v2.1.3, etc.)
      - 'v*'
  
  workflow_dispatch:
    # Allow manual triggering with custom tag input
    inputs:
      tag_name:
        description: 'Manual Release Tag (e.g., v1.0.0)'
        required: true
        default: 'v-manual'

jobs:
  # ========================================================================
  # BUILD JOB: Compile native binaries for all platforms
  # ========================================================================
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          # ===== LINUX TARGETS =====
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rsdk-linux-x86_64.node
          
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: rsdk-linux-arm64.node
            # ARM64 cross-compilation requires special setup
            setup: |
              sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
              echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
              echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

          # ===== macOS TARGETS =====
          - host: macos-latest
            target: x86_64-apple-darwin
            artifact_name: rsdk-darwin-x86_64.node
          
          - host: macos-latest
            target: aarch64-apple-darwin
            artifact_name: rsdk-darwin-arm64.node

          # ===== WINDOWS TARGETS =====
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rsdk-windows-x86_64.node
          
          - host: windows-latest
            target: aarch64-pc-windows-msvc
            artifact_name: rsdk-windows-arm64.node

    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}

    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Setup Node.js runtime (required for napi-rs and package scripts)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install pnpm package manager
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          run_install: false # Explicitly manual to inject env vars

      # Install project dependencies
      - name: Install Dependencies
        run: pnpm install
        env:
          # TSR_DEV: Skip binary sync check during CI builds
          # This prevents the workflow from attempting to download pre-built binaries
          TSR_DEV: "true"

      # Setup cross-compilation tools for ARM64 on Linux
      - name: Setup Linux Cross-Compilation
        if: ${{ matrix.settings.setup }}
        run: ${{ matrix.settings.setup }}

      # Install Rust toolchain and target triple
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      # Build the native FFI module using napi-rs
      - name: Build FFI
        run: pnpm run build:ffi
        env:
          TARGET: ${{ matrix.settings.target }}

      # Locate and rename the generated .node binary
      - name: Package Binary
        shell: bash
        run: |
          # Find the generated .node file (napi-rs names it based on Cargo.toml)
          # We search in the root and subdirectories
          GENERATED_FILE=$(find . -name "*.node" | head -n 1)
          
          if [ -z "$GENERATED_FILE" ]; then
            echo "::error::No .node binary found after build!"
            exit 1
          fi
          
          echo "Found binary at: $GENERATED_FILE"
          mv "$GENERATED_FILE" "${{ matrix.settings.artifact_name }}"
          echo "Renamed to: ${{ matrix.settings.artifact_name }}"

      # Upload compiled binary as workflow artifact
      # This makes it available for the release job
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rsdk-${{ matrix.settings.target }}
          path: ${{ matrix.settings.artifact_name }}
          if-no-files-found: error

  # ========================================================================
  # RELEASE JOB: Create GitHub release and upload artifacts
  # ========================================================================
  # This job runs AFTER all build jobs complete successfully
  # FIX: Condition updated to support both tag pushes AND manual dispatch
  # ========================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    # FIXED: Added workflow_dispatch to the condition
    # Now runs when:
    #   1. A tag matching 'v*' is pushed (github.event_name == 'push')
    #   2. Manual workflow dispatch is triggered (github.event_name == 'workflow_dispatch')
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: write  # Required to create releases and tags

    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Determine the release tag from either push event or manual input
      - name: Determine Release Tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # For manual dispatch, use the provided tag input
            TAG="${{ github.event.inputs.tag_name }}"
          else
            # For tag push, extract tag name from ref (e.g., refs/tags/v1.0.0 -> v1.0.0)
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Release tag will be: $TAG"

      # Download all platform-specific artifacts from build job
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true  # Flatten directory structure

      # Create GitHub release and attach binaries
      - name: Create Release and Upload Binaries
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: artifacts/rsdk-*.node  # Attach all platform binaries
          generate_release_notes: true  # Auto-generate release notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Cleanup: Delete older releases to keep repository clean
      # Keeps only the latest release
      - name: Delete Older Releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all release tags, sorted by newest first using GitHub CLI
          TAGS=$(gh release list --json tagName -q '.[].tagName')
          
          # Skip the first one (the one we just created) and loop through the rest
          echo "$TAGS" | tail -n +2 | while read TAG; do
            if [ -n "$TAG" ]; then
              echo "Deleting old release and tag: $TAG"
              # --cleanup-tag ensures the git tag is deleted along with the release
              gh release delete "$TAG" --cleanup-tag --yes
            fi
          done