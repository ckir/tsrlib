name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: test - ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Dependencies
        run: pnpm install
        env:
          # Bypass the prebuilt binary download hook; we build it fresh below
          TSR_DEV: "true"

      - name: Build Rust FFI Bridge
        run: pnpm run build:ffi

      - name: Align Native Binary
        shell: bash
        run: |
          cd packages/tsdk/src
          # Remove NAPI-RS generated wrapper files that conflict with the custom tsrlib loader
          rm -f index.js index.d.ts rsdk.js rsdk.d.ts
          
          # Rename OS-specific binary to 'rsdk.node' for consistent cross-platform loading
          GENERATED_FILE=$(find . -maxdepth 1 -name "*.node" ! -name "rsdk.node" | head -n 1 || true)
          if [ -n "$GENERATED_FILE" ]; then
            echo "Aligning binary: $GENERATED_FILE -> rsdk.node"
            mv "$GENERATED_FILE" rsdk.node
          fi

      - name: Sync Sidecars (Vector & Caddy)
        run: npx tsx packages/sidecars/src/sync-binaries.ts

      - name: Run Linter
        run: pnpm run lint

      - name: Run Integration Tests
        run: pnpm run test